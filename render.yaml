databases:
  - name: powder-hunter-db
    databaseName: powder_hunter
    user: powder_hunter_user
    plan: free
    region: singapore        # ← 追加

services:
  - type: web
    name: powder-hunter-web
    env: ruby
    region: singapore        # ← 追加
    buildCommand: "./bin/render-build.sh"
    startCommand: "bundle exec puma -C config/puma.rb"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: powder-hunter-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: GMAIL_USERNAME
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: SECRET_KEY_BASE
        generateValue: true

  - type: cron
    name: powder-hunter-cron
    env: ruby
    region: singapore        # ← 追加
    schedule: "0 0 * * *"
    buildCommand: "./bin/render-build.sh"
    startCommand: "bundle exec rake powder:check"
    envVars:
      - key: RAILS_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: powder-hunter-db
          property: connectionString
      - key: GMAIL_USERNAME
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
