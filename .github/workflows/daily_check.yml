name: Daily Powder Check

on:
  schedule:
    # 毎日午前8時(JST) = 毎日午後11時(UTC)
    - cron: '0 23 * * *'
  workflow_dispatch: # 手動実行用ボタンを追加

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Powder Check Task
        run: |
          # --retry 10: 最大10回リトライ
          # --retry-delay 5: 5秒おきにリトライ
          # --retry-all-errors: 502などのサーバーエラー時もリトライ
          curl -f --retry 10 --retry-delay 5 --retry-all-errors "https://powder-hunter-sqlite.fly.dev/tasks/powder_check?token=${{ secrets.CRON_TOKEN }}"
